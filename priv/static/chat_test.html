<!DOCTYPE html>
<html>
<head>
    <title>Чат тест</title>
    <script src="https://cdn.jsdelivr.net/npm/phoenix@1.7.0/phoenix.min.js"></script>
</head>
<body>
    <h1>Тест WebSocket</h1>
    <div id="status"></div>
    <div id="messages"></div>
    
    <input id="msg" placeholder="сообщение">
    <button onclick="sendMsg()">Отправить</button>

    <script>
        let status = document.getElementById('status');
        let messages = document.getElementById('messages');
        let channel;
        
        let socket = new Phoenix.Socket("/socket", {
            params: {user_id: "mark"}
        });
        
        socket.onOpen(() => status.innerHTML = "✅ WebSocket открыт!");
        socket.onError(() => status.innerHTML = "❌ Ошибка");
        socket.onClose(() => status.innerHTML = "🔒 Закрыт");
        
        socket.connect();
        
        // Через секунду пробуем зайти в комнату
        setTimeout(() => {
            channel = socket.channel("room:general", {});
            channel.join()
                .receive("ok", () => {
                    status.innerHTML = "✅ В комнате general!";
                })
                .receive("error", (e) => {
                    status.innerHTML = "❌ Ошибка входа: " + JSON.stringify(e);
                });
            
            channel.on("new_message", (msg) => {
                messages.innerHTML += `<div><b>${msg.user}:</b> ${msg.body}</div>`;
            });
        }, 1000);
        
        function sendMsg() {
            let input = document.getElementById('msg');
            channel.push("new_message", {body: input.value});
            input.value = '';
        }
    </script>
</body>
</html>
